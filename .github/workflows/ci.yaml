name: ci

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build project
        run: mvn -B clean package

  check_if_version_upgraded:
    name: Check if version upgrade
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build

    outputs:
      from_version: ${{ steps.version.outputs.from_version }}
      to_version: ${{ steps.version.outputs.to_version }}
      is_upgraded_version: ${{ steps.version.outputs.is_upgraded_version }}

    steps:
      - uses: actions/checkout@v6
        fetch-depth: 0

      - name: Extract version from pom
        id: version
        run: |
          CURRENT_VERSION=$(mvn -q -Dexpression=project.version -DforceStdout help:evaluate | tail -n 1)

          git checkout HEAD~1
          PREVIOUS_VERSION=$(mvn -q -Dexpression=project.version -DforceStdout help:evaluate | tail -n 1)

          git checkout -

          echo "from_version=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT
          echo "to_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "is_upgraded_version=true" >> $GITHUB_OUTPUT
          else
            echo "is_upgraded_version=false" >> $GITHUB_OUTPUT
          fi

  create_github_release:
    runs-on: ubuntu-latest
    needs: check_if_version_upgraded

    if: needs.check_if_version_upgraded.outputs.is_upgraded_version == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build project
        run: mvn -B clean package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ needs.check_if_version_upgraded.outputs.to_version }}
          tag_name: v${{ needs.check_if_version_upgraded.outputs.to_version }}
          target_commitish: ${{ github.head_ref || github.ref }}
          generate_release_notes: true
          draft: false
          files: target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
